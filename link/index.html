<!DOCTYPE html>
<html>
<head>
  <title>Installing Momma Mobile…</title>
  <script>
    (function() {
      // Preserve query string from QR (e.g. ?token=...&guardianId=...)
      var params = window.location.search || '';

      // Deep link with dynamic params
      var deepLink = "nettielink://child/link" + params;

      // Fallback: always download latest APK
      var apkUrl = "https://github.com/CoreyD84/airnettie.github.io/releases/latest/download/app-release.apk";

      // Try deep link first
      window.location.replace(deepLink);

      // Fallback after delay
      setTimeout(function() {
        window.location.replace(apkUrl);
      }, 2000);
    })();
  </script>
</head>
<body>
  <p>Redirecting to NettieLink…</p>
</body>
</html>
